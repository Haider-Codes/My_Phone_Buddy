<!DOCTYPE html>
<html lang="en" data-th-replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Contact</title>
</head>
<body>

    <div id="content">

        <!-- If User is loggedIn -->
        <div data-th-if="${loggedInUser}">
            <div data-th-replace="~{user/sidebar :: user-sidebar}"></div>
        </div>

        <div class="sm:pl-64 p-4">
            
            <div class="grid grid-cols-12">

                <div class="md:col-span-2 lg:col-span-3"></div>
                <div class="col-span-12 md:col-span-8 lg:col-span-6">                
                    <div class="bg-neutral-primary-soft block p-6 border border-default rounded-base shadow-xs">
                        <h1 class="text-2xl text-center font-semibold mb-2">Add New Contact</h1>
                        <h6 class="font-serif text-sm text-center text-gray-400 dark:text-gray-500 mb-4">The contact will be stored on cloud, which can be emailed directly from the application...</h6>
                    
                        <!-- Including 'message' fragment for successfull contact add acknowledgement -->
                        <div data-th-replace="~{message :: message}"></div>

                        <form data-th-action="@{'/user/contacts/add'}" method="post" data-th-object="${contactInfo}" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label for="name" class="block mb-2.5 text-sm font-medium text-heading">Name</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                                        <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                            <path fill-rule="evenodd" d="M12 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm-2 9a4 4 0 0 0-4 4v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1a4 4 0 0 0-4-4h-4Z" clip-rule="evenodd"/>
                                        </svg>
                                    </div>
                                    <input type="text" id="input-group-1" data-th-field="*{name}" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Enter contact's name">
                                </div>
                                <!-- Validating input fields -->
                                <p data-th-if="${#fields.hasErrors('name')}" data-th-text="${#fields.errors('name')[0]}" class="text-sm text-red-500 px-2 py-2"></p>
                            </div>
                            <div class="mb-4">
                            <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Email</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                                        <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M2.038 5.61A2.01 2.01 0 0 0 2 6v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6c0-.12-.01-.238-.03-.352l-.866.65-7.89 6.032a2 2 0 0 1-2.429 0L2.884 6.288l-.846-.677Z"/>
                                            <path d="M20.677 4.117A1.996 1.996 0 0 0 20 4H4c-.225 0-.44.037-.642.105l.758.607L12 10.742 19.9 4.7l.777-.583Z"/>
                                        </svg>
                                </div>
                                    <input type="text" id="input-group-1" data-th-field="*{email}" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Enter contact's email">
                                </div>
                                <!-- Validating input fields -->
                                <p data-th-if="${#fields.hasErrors('email')}" data-th-text="${#fields.errors('email')[0]}" class="text-sm text-red-500 px-2 py-2"></p>
                            </div>
                            <div class="mb-4">
                                <label for="phoneNumber" class="block mb-2.5 text-sm font-medium text-heading">Phone Number</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M7.978 4a2.553 2.553 0 0 0-1.926.877C4.233 6.7 3.699 8.751 4.153 10.814c.44 1.995 1.778 3.893 3.456 5.572 1.68 1.679 3.577 3.018 5.57 3.459 2.062.456 4.115-.073 5.94-1.885a2.556 2.556 0 0 0 .001-3.861l-1.21-1.21a2.689 2.689 0 0 0-3.802 0l-.617.618a.806.806 0 0 1-1.14 0l-1.854-1.855a.807.807 0 0 1 0-1.14l.618-.62a2.692 2.692 0 0 0 0-3.803l-1.21-1.211A2.555 2.555 0 0 0 7.978 4Z"/>
                                    </svg>
                                    </div>
                                    <input type="text" id="input-group-1" data-th-field="*{phoneNumber}" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Enter contact's phone number">
                                </div>
                                <!-- Validating input fields -->
                                <p data-th-if="${#fields.hasErrors('phoneNumber')}" data-th-text="${#fields.errors('phoneNumber')[0]}" class="text-sm text-red-500 px-2 py-2"></p>
                            </div> 
                            <div class="mb-4">                            
                                <label for="address" class="flex items-center gap-2 mb-2.5 text-sm font-medium text-heading">
                                <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                    <path fill-rule="evenodd" d="M7 2a2 2 0 0 0-2 2v1a1 1 0 0 0 0 2v1a1 1 0 0 0 0 2v1a1 1 0 1 0 0 2v1a1 1 0 1 0 0 2v1a1 1 0 1 0 0 2v1a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H7Zm3 8a3 3 0 1 1 6 0 3 3 0 0 1-6 0Zm-1 7a3 3 0 0 1 3-3h2a3 3 0 0 1 3 3 1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1Z" clip-rule="evenodd"/>
                                </svg>
                                Address
                                </label>
                                <textarea id="address" rows="4" data-th-field="*{address}" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-3.5 shadow-xs placeholder:text-body" placeholder="Enter contact's address..."></textarea>
                                <!-- Validating input fields -->
                                <!-- <p class="text-sm text-red-500 px-2 py-2"></p> -->
                            </div>
                            <div class="mb-4">                            
                                <label for="description" class="flex items-center gap-2 mb-2.5 text-sm font-medium text-heading">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
                                    </svg>
                                Description
                                </label>
                                <textarea id="decription" rows="6" data-th-field="*{description}" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-3.5 shadow-xs placeholder:text-body" placeholder="Mention something about this contact..."></textarea>
                                <!-- Validating input fields -->
                                <!-- <p class="text-sm text-red-500 px-2 py-2"></p> -->
                            </div>
                            <div class="mb-4">                            
                                <label class="block mb-2.5 text-sm font-medium text-heading" for="file_input">Image</label>
                                <input data-th-field="*{picture}" class="cursor-pointer bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full shadow-xs placeholder:text-body" id="file_input" type="file">
                                <!-- Preview of image uploaded -->
                                <img class="w-fit mx-auto mt-3 shadow-2xl rounded" id="image-preview" alt="">
                                <!-- Validating input images -->
                                <p data-th-if="${#fields.hasErrors('picture')}" data-th-text="${#fields.errors('picture')[0]}" class="text-sm text-red-500 px-2 py-2"></p>                          
                            </div>  
                            <!-- Social Links -->
                             <div class="flex space-x-3">
                                <div class="mb-4 w-full">
                                    <label for="website" class="block mb-2.5 text-sm font-medium text-heading">Website</label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                                            <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                                <path fill-rule="evenodd" d="M8.64 4.737A7.97 7.97 0 0 1 12 4a7.997 7.997 0 0 1 6.933 4.006h-.738c-.65 0-1.177.25-1.177.9 0 .33 0 2.04-2.026 2.008-1.972 0-1.972-1.732-1.972-2.008 0-1.429-.787-1.65-1.752-1.923-.374-.105-.774-.218-1.166-.411-1.004-.497-1.347-1.183-1.461-1.835ZM6 4a10.06 10.06 0 0 0-2.812 3.27A9.956 9.956 0 0 0 2 12c0 5.289 4.106 9.619 9.304 9.976l.054.004a10.12 10.12 0 0 0 1.155.007h.002a10.024 10.024 0 0 0 1.5-.19 9.925 9.925 0 0 0 2.259-.754 10.041 10.041 0 0 0 4.987-5.263A9.917 9.917 0 0 0 22 12a10.025 10.025 0 0 0-.315-2.5A10.001 10.001 0 0 0 12 2a9.964 9.964 0 0 0-6 2Zm13.372 11.113a2.575 2.575 0 0 0-.75-.112h-.217A3.405 3.405 0 0 0 15 18.405v1.014a8.027 8.027 0 0 0 4.372-4.307ZM12.114 20H12A8 8 0 0 1 5.1 7.95c.95.541 1.421 1.537 1.835 2.415.209.441.403.853.637 1.162.54.712 1.063 1.019 1.591 1.328.52.305 1.047.613 1.6 1.316 1.44 1.825 1.419 4.366 1.35 5.828Z" clip-rule="evenodd"/>
                                            </svg>
                                        </div>
                                        <input type="text" id="input-group-1" data-th-field="*{websiteLink}" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Enter contact's website">
                                    </div> 
                                 </div>
                                 <div class="mb-4 w-full">
                                    <label for="LinkedIn" class="block mb-2.5 text-sm font-medium text-heading">LinkedIn</label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                                            <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                                <path fill-rule="evenodd" d="M12.51 8.796v1.697a3.738 3.738 0 0 1 3.288-1.684c3.455 0 4.202 2.16 4.202 4.97V19.5h-3.2v-5.072c0-1.21-.244-2.766-2.128-2.766-1.827 0-2.139 1.317-2.139 2.676V19.5h-3.19V8.796h3.168ZM7.2 6.106a1.61 1.61 0 0 1-.988 1.483 1.595 1.595 0 0 1-1.743-.348A1.607 1.607 0 0 1 5.6 4.5a1.601 1.601 0 0 1 1.6 1.606Z" clip-rule="evenodd"/>
                                                <path d="M7.2 8.809H4V19.5h3.2V8.809Z"/>
                                            </svg>
                                        </div>
                                        <input type="text" id="input-group-1" data-th-field="*{linkedInLink}" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Enter contact's linkedIn profile">
                                    </div> 
                                 </div>
                             </div>  
                            <div class="flex items-center mb-4">
                                <input id="default-checkbox" type="checkbox" data-th-field="*{favourite}" class="w-4 h-4 border border-default-medium rounded-xs bg-neutral-secondary-medium focus:ring-2 focus:ring-brand-soft">
                                <label for="default-checkbox" class="select-none ms-2 text-sm font-medium text-heading">Mark this contact as favourite?</label>
                            </div> 
                            
                            <div class="flex gap-2">
                                <button type="submit" class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none w-1/2 mb-3">Add Contact</button>
                                <button type="reset" class="text-white text-center bg-danger box-border border border-transparent hover:bg-danger-strong focus:ring-4 focus:ring-danger-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none w-1/2 mb-3">Reset</button>
                            </div>
                        </form>
                    </div>
                </div>
                <!-- <div class="md:col-span-2 lg:col-span-3"></div> -->
            </div>

        </div>
    </div>
    <!-- Added admin.js script for handling contact image previews -->
    <script data-th-src="@{'/js/admin.js'}"></script>
    <script>console.log("Welcome to the contact form.");</script>
</body>
</html>
