<!DOCTYPE html>
<html lang="en" data-th-replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-th-text="${loggedInUser.firstName}+' - Profile'">Profile</title>
</head>
<body>

    <div id="content" data-th-object="${loggedInUser}">

        <div data-th-if="${loggedInUser}">
            <div data-th-replace="~{user/sidebar :: user-sidebar}"></div>
        </div>

        <div class="sm:pl-64 text-center p-4">
            <div class="flex flex-col items-center justify-center">
                <h1 class="text-xl md:text-2xl lg:text-3xl pb-4">Welcome <span data-th-text="*{firstName} + *{lastName}"></span> to your Profile.</h1>
                <div class="relative flex items-center justify-center bg-neutral-primary-soft max-w-lg w-full p-6 border border-default rounded-base shadow-md">
                    <button id="dropdownButton" data-dropdown-toggle="dropdown" class="absolute top-2 inset-e-2 text-body hover:text-heading bg-neutral-primary-soft box-border border border-transparent hover:bg-neutral-tertiary focus:ring-4 focus:ring-neutral-tertiary rounded-base p-1.5 focus:outline-none" type="button">
                        <span class="sr-only">Open dropdown</span>
                        <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="3" d="M6 12h.01m6 0h.01m5.99 0h.01"/></svg>
                    </button>
                    <!-- Dropdown menu -->
                    <div id="dropdown" class="z-10 bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-36 block hidden">
                        <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownButton">
                            <li>
                                <a href="#" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded-md">Edit</a>
                            </li>
                            <li>
                                <a href="#" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded-md">Export Data</a>
                            </li>
                            <li>
                                <a href="#" class="inline-flex items-center w-full p-2 text-fg-danger hover:bg-neutral-tertiary-medium rounded-md">Delete</a>
                            </li>
                        </ul>
                    </div>
                    <div class="flex flex-col items-center w-full">
                        <img class="w-24 h-24 mb-6 rounded-full" data-th-src="*{profilePic}" data-th-onerror="|this.onerror=null; this.src='@{/assets/default-profile-image-2.png}';|" alt="Bonnie image"/>
                        <h5 class="mb-0.5 text-xl font-semibold tracking-tight text-heading" data-th-text="*{firstName} + ' ' + *{lastName}"></h5>
                        <span class="text-sm text-body" data-th-text="*{email}"></span>

                        <span class="text-xl p-3 text-heading">+91 1234567890</span>

                        <span class="text-sm p-3 text-body" data-th-text="*{about}"></span>
                        
                        <div class="flex justify-between w-full gap-2 p-2">
                            <div>
                                <span class="text-sm text-body">Email Verifed: </span>
                                <span class="text-sm font-semibold" data-th-text="*{isEmailVerified}"
                                data-th-classappend="*{{isEmailVerified} ? ' text-success' : ' text-danger'}"></span>
                            </div>
                            <div>
                                <span class="text-sm text-body">Phone Verifed: </span>
                                <span class="text-sm font-semibold" data-th-text="*{isPhoneVerified}"
                                data-th-classappend="*{{isPhoneVerified} ? ' text-success' : ' text-danger'}"></span>
                            </div>
                        </div>

                        <div class="flex mt-4 md:mt-6 gap-4">
                            <a data-th-href="@{'/user/profile/update?email='+*{email}}" type="button" class="inline-flex items-center text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">
                                <svg class="w-5 h-5 me-1.5 -ms-0.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12h4m-2 2v-4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
                                Update Profile
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>console.log("Welcome to the user profile.");</script>
</body>
</html>
