<!DOCTYPE html>
<html lang="en" data-th-replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
</head>
<body>

    <div id="content">

        <!-- If User is loggedIn -->
        <div data-th-if="${loggedInUser}">
            <div data-th-replace="~{user/sidebar :: user-sidebar}"></div>
        </div>

        <div class="sm:pl-64 p-4">
            <h1 class="text-xl md:text-2xl lg:text-3xl text-center pb-2"><span data-th-text="${loggedInUser.firstName}"></span> Contacts</h1>
            <p class="text-sm text-center font-serif text-gray-400 dark:text-gray-500 mb-3">List of all contacts..</p>
            
            <!-- Acknowledgement message if contact is deleted successfully -->
            <div data-th-replace="~{message :: message}"></div>

            <div class="relative overflow-x-auto mx-auto md:ml-4 bg-neutral-primary-soft shadow-xs rounded-base border border-default">
                <div class="flex items-center justify-between">
                    <form data-th-action="@{'/user/contacts/search'}" method="get" data-th-object="${searchContactInfo}">
                        <div class="flex items-center space-x-2 flex-column md:flex-row flex-wrap space-y-4 md:space-y-0 p-4">
                            <div>
                                <!-- Dropdown menu -->
                                <div id="dropdown-2" class="z-10 bg-neutral-primary-medium border border-default-medium rounded-base w-fit">
                                    <select id="countries" data-th-field=*{field} name="field" class="block w-full px-3 py-2 bg-neutral-secondary-medium border border-default-medium text-body text-sm rounded focus:ring-brand focus:border-brand shadow-xs placeholder:text-body">
                                        <option value="" selected>Search By</option>
                                        <option value="name">Name</option>
                                        <option value="email">Email</option>
                                        <option value="phoneNumber">Phone Number</option>
                                        <option value="description">Description</option>
                                    </select>
                                </div>
                            </div>
                            <label for="input-group-1" class="sr-only">Search</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                                    <svg class="w-full h-4 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/></svg>
                                </div>
                                <input type="text" id="input-group-1" data-th-field="*{keyword}"name="keyword" class="block w-full max-w-96 ps-9 pe-3 py-2 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Search your contacts...">
                            </div>
                            <button type="submit" class="p-2 bg-brand text-white rounded">Search</button>
                        </div>
                    </form>
                    <!-- Export Contacts button -->
                    <div class="mr-3">
                        <button id="dropdownDefaultButton" data-dropdown-toggle="dropdown" class="inline-flex items-center justify-center text-white bg-success box-border border border-transparent hover:bg-success-strong focus:ring-4 focus:ring-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none" type="button">
                        Export Contacts 
                        <svg class="w-4 h-4 ms-1.5 -me-0.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/></svg>
                        </button>

                        <!-- Dropdown menu -->
                        <div id="dropdown" class="z-10 hidden bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44">
                            <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownDefaultButton">
                                <li>
                                    <a href="#" onclick="exportContactsToXlsx();" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded">Excel (.xlsx)</a>
                                </li>
                                <li>
                                    <a href="#" onclick="exportContactsToPdf();" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded">PDF (.pdf)</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <!-- Table to show all contacts -->
                <table id="contacts-table" class="w-full text-sm text-left rtl:text-right text-body">
                    <thead class="text-sm text-body bg-neutral-secondary-medium border-b border-t border-default-medium">
                        <tr>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Name
                            </th>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Phone
                            </th>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Description
                            </th>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Social Links
                            </th>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Favourite
                            </th>
                            <th scope="col" class="px-6 py-3 font-medium">
                                Action
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-default hover:bg-neutral-secondary-medium"
                            data-th-object="${contact}" data-th-each="contact : ${contacts.getContent()}">
                            <th scope="row" class="flex items-center px-6 py-4 text-heading whitespace-nowrap">
                                <img class="w-10 h-10 rounded-full" data-th-onerror="|this.onerror=null; this.src='@{/assets/default-profile-image-2.png}';|" data-th-src="@{*{picture}}" src="/docs/images/people/profile-picture-1.jpg" alt="Jese image">
                                <div class="ps-3">
                                    <div class="text-base font-semibold" data-th-text="*{name}"></div>
                                    <div class="font-normal text-body" data-th-text="*{email}"></div>
                                </div>  
                            </th>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M7.978 4a2.553 2.553 0 0 0-1.926.877C4.233 6.7 3.699 8.751 4.153 10.814c.44 1.995 1.778 3.893 3.456 5.572 1.68 1.679 3.577 3.018 5.57 3.459 2.062.456 4.115-.073 5.94-1.885a2.556 2.556 0 0 0 .001-3.861l-1.21-1.21a2.689 2.689 0 0 0-3.802 0l-.617.618a.806.806 0 0 1-1.14 0l-1.854-1.855a.807.807 0 0 1 0-1.14l.618-.62a2.692 2.692 0 0 0 0-3.803l-1.21-1.211A2.555 2.555 0 0 0 7.978 4Z"/>
                                    </svg>           
                                    <span data-th-text="*{phoneNumber}"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
                                    </svg>
                                    <span data-th-text="*{description}"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <a data-th-href="@{*{websiteLink}}" target="_blank">
                                        <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                            <path fill-rule="evenodd" d="M8.64 4.737A7.97 7.97 0 0 1 12 4a7.997 7.997 0 0 1 6.933 4.006h-.738c-.65 0-1.177.25-1.177.9 0 .33 0 2.04-2.026 2.008-1.972 0-1.972-1.732-1.972-2.008 0-1.429-.787-1.65-1.752-1.923-.374-.105-.774-.218-1.166-.411-1.004-.497-1.347-1.183-1.461-1.835ZM6 4a10.06 10.06 0 0 0-2.812 3.27A9.956 9.956 0 0 0 2 12c0 5.289 4.106 9.619 9.304 9.976l.054.004a10.12 10.12 0 0 0 1.155.007h.002a10.024 10.024 0 0 0 1.5-.19 9.925 9.925 0 0 0 2.259-.754 10.041 10.041 0 0 0 4.987-5.263A9.917 9.917 0 0 0 22 12a10.025 10.025 0 0 0-.315-2.5A10.001 10.001 0 0 0 12 2a9.964 9.964 0 0 0-6 2Zm13.372 11.113a2.575 2.575 0 0 0-.75-.112h-.217A3.405 3.405 0 0 0 15 18.405v1.014a8.027 8.027 0 0 0 4.372-4.307ZM12.114 20H12A8 8 0 0 1 5.1 7.95c.95.541 1.421 1.537 1.835 2.415.209.441.403.853.637 1.162.54.712 1.063 1.019 1.591 1.328.52.305 1.047.613 1.6 1.316 1.44 1.825 1.419 4.366 1.35 5.828Z" clip-rule="evenodd"/>
                                        </svg>          
                                    </a>
                                    <a data-th-href="@{*{linkedInLink}}" target="_blank">
                                        <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                            <path fill-rule="evenodd" d="M12.51 8.796v1.697a3.738 3.738 0 0 1 3.288-1.684c3.455 0 4.202 2.16 4.202 4.97V19.5h-3.2v-5.072c0-1.21-.244-2.766-2.128-2.766-1.827 0-2.139 1.317-2.139 2.676V19.5h-3.19V8.796h3.168ZM7.2 6.106a1.61 1.61 0 0 1-.988 1.483 1.595 1.595 0 0 1-1.743-.348A1.607 1.607 0 0 1 5.6 4.5a1.601 1.601 0 0 1 1.6 1.606Z" clip-rule="evenodd"/>
                                            <path d="M7.2 8.809H4V19.5h3.2V8.809Z"/>
                                        </svg>         
                                    </a>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div data-th-if=*{isFavourite}>
                                    <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="red" viewBox="0 0 24 24">
                                        <path d="m12.75 20.66 6.184-7.098c2.677-2.884 2.559-6.506.754-8.705-.898-1.095-2.206-1.816-3.72-1.855-1.293-.034-2.652.43-3.963 1.442-1.315-1.012-2.678-1.476-3.973-1.442-1.515.04-2.825.76-3.724 1.855-1.806 2.201-1.915 5.823.772 8.706l6.183 7.097c.19.216.46.34.743.34a.985.985 0 0 0 .743-.34Z"/>
                                    </svg>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <!-- Modal toggle -->
                                <div class="flex items-center gap-2">
                                    <!-- Using thymeleaf data-attribute -->
                                    <a href="#" data-th-data-id="*{id}" data-th-onclick="loadContact(this.getAttribute('data-id'))">
                                    <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                        <path fill-rule="evenodd" d="M4.998 7.78C6.729 6.345 9.198 5 12 5c2.802 0 5.27 1.345 7.002 2.78a12.713 12.713 0 0 1 2.096 2.183c.253.344.465.682.618.997.14.286.284.658.284 1.04s-.145.754-.284 1.04a6.6 6.6 0 0 1-.618.997 12.712 12.712 0 0 1-2.096 2.183C17.271 17.655 14.802 19 12 19c-2.802 0-5.27-1.345-7.002-2.78a12.712 12.712 0 0 1-2.096-2.183 6.6 6.6 0 0 1-.618-.997C2.144 12.754 2 12.382 2 12s.145-.754.284-1.04c.153-.315.365-.653.618-.997A12.714 12.714 0 0 1 4.998 7.78ZM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/>
                                    </svg>
                                    </a>
                                    <a data-th-href="@{'/user/contacts/update/'+*{id}}">
                                        <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                            <path fill-rule="evenodd" d="M14 4.182A4.136 4.136 0 0 1 16.9 3c1.087 0 2.13.425 2.899 1.182A4.01 4.01 0 0 1 21 7.037c0 1.068-.43 2.092-1.194 2.849L18.5 11.214l-5.8-5.71 1.287-1.31.012-.012Zm-2.717 2.763L6.186 12.13l2.175 2.141 5.063-5.218-2.141-2.108Zm-6.25 6.886-1.98 5.849a.992.992 0 0 0 .245 1.026 1.03 1.03 0 0 0 1.043.242L10.282 19l-5.25-5.168Zm6.954 4.01 5.096-5.186-2.218-2.183-5.063 5.218 2.185 2.15Z" clip-rule="evenodd"/>
                                        </svg>       
                                    </a>
                                    <a href="#" data-th-data-id="*{id}" data-th-onclick="triggerAlert(this.getAttribute('data-id'))">
                                        <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                            <path fill-rule="evenodd" d="M8.586 2.586A2 2 0 0 1 10 2h4a2 2 0 0 1 2 2v2h3a1 1 0 1 1 0 2v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8a1 1 0 0 1 0-2h3V4a2 2 0 0 1 .586-1.414ZM10 6h4V4h-4v2Zm1 4a1 1 0 1 0-2 0v8a1 1 0 1 0 2 0v-8Zm4 0a1 1 0 1 0-2 0v8a1 1 0 1 0 2 0v-8Z" clip-rule="evenodd"/>
                                        </svg>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <!-- Hidden table (Shall not be included in main content) for exporting contacts -->
                 <table class=" hidden w-full mt-5 text-sm text-left rtl:text-right text-heading" id="export-contacts">
                    <thead class="text-sm text-body bg-neutral-secondary-medium border-b border-t border-default-medium">
                        <th class="px-6 py-5">Name</th>
                        <th class="px-6 py-5">Email</th>
                        <th class="px-6 py-5">Phone Number</th>
                        <th class="px-6 py-5">Address</th>
                        <th class="px-6 py-5">Description</th>
                    </thead>
                    <tbody>
                        <tr class="odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-default" data-th-object="${contact}" data-th-each="contact : ${contacts.getContent()}">
                            <td class="px-6 py-4">
                                <span data-th-text="*{name}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span data-th-text="*{email}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span data-th-text="*{phoneNumber}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span data-th-text="*{address}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span data-th-text="*{description}"></span>
                            </td>
                        </tr> 
                    </tbody>
                 </table>
                
                 <!-- Pagination container -->
                 <div class="pagination_container p-4 flex items-center justify-center">
                    <nav aria-label="Page navigation example" class="flex items-center space-x-4">
                        <ul class="flex -space-x-px text-sm" data-th-object="${pageInfo}">
                            <li data-th-unless="${contacts.isFirst()}">
                            <a data-th-href="@{'/user/contacts?pageNo='+${contacts.getNumber()-1}}+'&pageSize='+*{pageSize}" class="flex items-center justify-center text-body bg-neutral-secondary-medium border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading shadow-xs font-medium leading-5 rounded-s-base text-sm px-3 h-9 focus:outline-none">Previous</a>
                            </li>
                            <li data-th-each="pageNumber : ${#numbers.sequence(0, contacts.getTotalPages()-1)}">
                                <a data-th-href="@{'/user/contacts?pageNo='+${pageNumber}+'&pageSize='+*{pageSize}}" class="flex items-center justify-center text-body dark:bg-neutral-secondary-medium border border-default-medium hover:bg-yellow-300 dark:hover:bg-neutral-tertiary-medium hover:text-heading shadow-xs font-medium leading-5 text-sm w-9 h-9 focus:outline-none" 
                                data-th-classappend="${pageNumber == contacts.getNumber()} ? ' box-border bg-yellow-200 dark:bg-neutral-tertiary-medium text-fg-brand hover:text-fg-brand' : ''" data-th-text="${pageNumber+1}"></a>
                            </li>
                            <li data-th-unless="${contacts.isLast()}">
                            <a data-th-href="@{'/user/contacts?pageNo='+${contacts.getNumber()+1}}+'&pageSize='+*{pageSize}" class="flex items-center justify-center text-body bg-neutral-secondary-medium border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading shadow-xs font-medium leading-5 rounded-e-base text-sm px-3 h-9 focus:outline-none">Next</a>
                            </li>
                        </ul>
                        <form class="w-32 mx-auto" data-th-object="${pageInfo}">
                            <label for="countries" class="sr-only">Select an option</label>
                            <select id="countries" data-th-field="*{pageSize}" data-th-onchange="this.form.submit()" class="block w-full px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm leading-4 rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body">
                            <option value="5" selected>5 per page</option>
                            <option value="2">2 per page</option>
                            <option value="10">10 per page</option>
                            </select>
                        </form>
                    </nav>
                 </div>
            </div>
            <div data-th-replace="~{user/contact_modal :: contact-modal}"></div>
        </div>
    </div>
    <script>console.log("Welcome to the view contacts page.");</script>
    <script data-th-src="@{'/js/contact-modal.js'}"></script>
    <script data-th-src="@{'/js/alert.js'}"></script>
    <script data-th-src="@{'/js/export.js'}"></script>
</body>
</html>
