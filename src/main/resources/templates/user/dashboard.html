<!DOCTYPE html>
<html lang="en" data-th-replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>

    <div id="content">

        <!-- If User is loggedIn -->
        <div data-th-if="${loggedInUser}">
            <div data-th-replace="~{user/sidebar :: user-sidebar}"></div>
        </div>

        <div class="sm:pl-64 text-center p-4">
            <h1 class="text-xl md:text-2xl lg:text-3xl pb-4">Welcome back 👋 <span data-th-text="${loggedInUser.firstName} + ' ' + ${loggedInUser.lastName}"></span> to your Dashboard.</h1>
            <p class="text-body text-center">Here’s what’s happening with your contacts</p>
            <!-- User Dashboard Body -->
            <section id="dashboard" class="w-full mx-auto px-4">

            <!-- HEADER -->
            <div class="flex flex-end items-end justify-end mt-3 mb-8">
                <a type="button" data-th-href="@{'/user/contacts/add'}" class="bg-linear-to-r from-blue-500 to-indigo-600 text-white px-5 py-2 rounded-xl shadow-lg hover:scale-105 transition">+ Add Contact</a>
            </div>

            <!-- STATS -->
            <div class="grid md:grid-cols-2 gap-6 mb-10">
                <div class="p-6 rounded-2xl bg-white/70 dark:bg-gray-800/70 backdrop-blur shadow-lg">
                    <p class="text-body">Total Contacts</p>
                    <h2 class="text-3xl font-bold" data-th-text="${loggedInUser.getContacts().size()}"></h2>
                    <span data-th-if="${addedContactsWithTime.size() > 0}" class="text-success text-sm" data-th-text="'+ ' +${addedContactsWithTime.size()} + ' last hour'"></span>
                </div>

                <div class="p-6 rounded-2xl bg-white/70 dark:bg-gray-800/70 backdrop-blur shadow-lg">
                    <p class="text-body">Favourites</p>
                    <h2 class="text-3xl font-bold" data-th-text="${favouriteContacts.size()}"></h2>
                    <span data-th-if="${addedFavouriteContactsWithTime.size() > 0}" class="text-success text-sm" data-th-text="'+ ' +${addedFavouriteContactsWithTime.size()} + ' new'"></span>
                </div>
            </div>

            <!-- MAIN GRID -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                <!-- LEFT SIDE -->
                <div class="lg:col-span-2 space-y-6">

                    <!-- TABLE - RECENTLY ADDED CONTACTS -->
                    <div class=" backdrop-blur rounded-2xl overflow-x-auto shadow-lg overflow-hidden border border-default">
                        <h3 class="text-xl font-semibold p-3">Recenty Added Contacts</h3>
                        <!-- Table to show favourites contacts -->
                        <table id="contacts-table" class="w-full text-sm text-left rtl:text-right text-body">
                            <thead class="text-sm text-body bg-neutral-secondary-medium border-b border-t border-default-medium">
                                <tr>
                                    <th scope="col" class="px-6 py-3 font-medium">
                                        Name
                                    </th>
                                    <th scope="col" class="px-6 py-3 font-medium">
                                        Phone
                                    </th>
                                    <th scope="col" class="px-6 py-3 font-medium">
                                        Description
                                    </th>
                                    <th scope="col" class="px-6 py-3 font-medium">
                                        Social Links
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-default hover:bg-neutral-secondary-medium"
                                    data-th-object="${contact}" data-th-each="contact : ${recentlyAddedContacts}">
                                    <th scope="row" class="flex items-center px-6 py-4 text-heading whitespace-nowrap">
                                        <img class="w-10 h-10 rounded-full" data-th-onerror="|this.onerror=null; this.src='@{/assets/default-profile-image-2.png}';|" data-th-src="@{*{picture}}" src="/docs/images/people/profile-picture-1.jpg" alt="Jese image">
                                        <div class="ps-3">
                                            <div class="text-base font-semibold" data-th-text="*{name}"></div>
                                            <div class="font-normal text-body" data-th-text="*{email}"></div>
                                        </div>  
                                    </th>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-2">
                                            <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                                <path d="M7.978 4a2.553 2.553 0 0 0-1.926.877C4.233 6.7 3.699 8.751 4.153 10.814c.44 1.995 1.778 3.893 3.456 5.572 1.68 1.679 3.577 3.018 5.57 3.459 2.062.456 4.115-.073 5.94-1.885a2.556 2.556 0 0 0 .001-3.861l-1.21-1.21a2.689 2.689 0 0 0-3.802 0l-.617.618a.806.806 0 0 1-1.14 0l-1.854-1.855a.807.807 0 0 1 0-1.14l.618-.62a2.692 2.692 0 0 0 0-3.803l-1.21-1.211A2.555 2.555 0 0 0 7.978 4Z"/>
                                            </svg>           
                                            <span data-th-text="*{phoneNumber}"></span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
                                            </svg>
                                            <span data-th-text="*{description}"></span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-2">
                                            <a data-th-href="@{*{websiteLink}}" target="_blank">
                                                <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                                    <path fill-rule="evenodd" d="M8.64 4.737A7.97 7.97 0 0 1 12 4a7.997 7.997 0 0 1 6.933 4.006h-.738c-.65 0-1.177.25-1.177.9 0 .33 0 2.04-2.026 2.008-1.972 0-1.972-1.732-1.972-2.008 0-1.429-.787-1.65-1.752-1.923-.374-.105-.774-.218-1.166-.411-1.004-.497-1.347-1.183-1.461-1.835ZM6 4a10.06 10.06 0 0 0-2.812 3.27A9.956 9.956 0 0 0 2 12c0 5.289 4.106 9.619 9.304 9.976l.054.004a10.12 10.12 0 0 0 1.155.007h.002a10.024 10.024 0 0 0 1.5-.19 9.925 9.925 0 0 0 2.259-.754 10.041 10.041 0 0 0 4.987-5.263A9.917 9.917 0 0 0 22 12a10.025 10.025 0 0 0-.315-2.5A10.001 10.001 0 0 0 12 2a9.964 9.964 0 0 0-6 2Zm13.372 11.113a2.575 2.575 0 0 0-.75-.112h-.217A3.405 3.405 0 0 0 15 18.405v1.014a8.027 8.027 0 0 0 4.372-4.307ZM12.114 20H12A8 8 0 0 1 5.1 7.95c.95.541 1.421 1.537 1.835 2.415.209.441.403.853.637 1.162.54.712 1.063 1.019 1.591 1.328.52.305 1.047.613 1.6 1.316 1.44 1.825 1.419 4.366 1.35 5.828Z" clip-rule="evenodd"/>
                                                </svg>          
                                            </a>
                                            <a data-th-href="@{*{linkedInLink}}" target="_blank">
                                                <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                                    <path fill-rule="evenodd" d="M12.51 8.796v1.697a3.738 3.738 0 0 1 3.288-1.684c3.455 0 4.202 2.16 4.202 4.97V19.5h-3.2v-5.072c0-1.21-.244-2.766-2.128-2.766-1.827 0-2.139 1.317-2.139 2.676V19.5h-3.19V8.796h3.168ZM7.2 6.106a1.61 1.61 0 0 1-.988 1.483 1.595 1.595 0 0 1-1.743-.348A1.607 1.607 0 0 1 5.6 4.5a1.601 1.601 0 0 1 1.6 1.606Z" clip-rule="evenodd"/>
                                                    <path d="M7.2 8.809H4V19.5h3.2V8.809Z"/>
                                                </svg>         
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- ACTIVITY -->
                    <div class="p-6 bg-white/70 dark:bg-gray-800/70 backdrop-blur rounded-2xl shadow-lg">
                        <h3 class="text-xl font-semibold mb-4">Recent Activity</h3>
                        <ul class="space-y-3 text-gray-500" data-th-object="${activity}" data-th-each="activity : ${recentActivities}">
                            <li data-th-if="*{content.contains('Added')}" data-th-text="'✅ ' + *{content} "></li>
                            <li data-th-if="*{content.contains('Updated')}" data-th-text="'✏️ ' + *{content} "></li>
                            <li data-th-if="*{content.contains('Deleted')}" data-th-text="'❌ ' + *{content} "></li>
                            <!-- <li>📥 Imported 20 contacts</li> -->
                        </ul>
                    </div>

                </div>

                <!-- RIGHT SIDE -->
                <div class="space-y-6">

                    <!-- QUICK ACTIONS -->
                    <div class="p-6 bg-white/70 dark:bg-gray-800/70 backdrop-blur rounded-2xl shadow-lg">
                        <h3 class="text-xl font-semibold mb-4">Quick Actions</h3>
                        <div class="grid gap-3">
                        <a type="button" data-th-href="@{'/user/contacts/add'}" class="p-3 bg-blue-500 text-white rounded-lg">➕ Add</a>
                        <!-- <button class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">📥 Import</button> -->
                        <button class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg" data-th-onclick="exportContactsToPdf();">📤 Export</button>
                        </div>
                    </div>

                    <!-- FAVORITES -->
                    <div class="p-6 bg-white/70 dark:bg-gray-800/70 backdrop-blur rounded-2xl shadow-lg">
                        <h3 class="text-xl font-semibold mb-4">Favorites</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between" data-th-object="${contact}" data-th-each="contact : ${topFavouriteContacts}">
                                <span data-th-text="'⭐ '+*{name}"></span>
                                <a href="#" class="text-fg-brand" data-th-data-id="*{id}" data-th-onclick="loadContact(this.getAttribute('data-id'))">View</a>
                            </div>
                        </div>
                    </div>

                </div>

            </div>

                <!-- Hidden table (Shall not be included in main content) for exporting contacts -->
                 <table class=" hidden w-full mt-5 text-sm text-left rtl:text-right text-heading" id="export-contacts">
                    <thead class="text-sm text-body bg-neutral-secondary-medium border-b border-t border-default-medium">
                        <th class="px-6 py-5">Name</th>
                        <th class="px-6 py-5">Email</th>
                        <th class="px-6 py-5">Phone Number</th>
                        <th class="px-6 py-5">Address</th>
                        <th class="px-6 py-5">Description</th>
                    </thead>
                    <tbody>
                        <tr class="odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-default" data-th-object="${contact}" data-th-each="contact : ${loggedInUser.getContacts()}">
                            <td class="px-6 py-4">
                                <span data-th-text="*{name}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span data-th-text="*{email}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span data-th-text="*{phoneNumber}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span data-th-text="*{address}"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span data-th-text="*{description}"></span>
                            </td>
                        </tr> 
                    </tbody>
                 </table>

            </section>
            <div data-th-replace="~{user/contact_modal :: contact-modal}"></div>
        </div>
    </div>
    <script>console.log("Welcome to the user dashboard.");</script>
    <script data-th-src="@{'/js/export.js'}"></script>
    <script data-th-src="@{'/js/contact-modal.js'}"></script>
</body>
</html>
