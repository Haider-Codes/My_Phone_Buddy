<div
    data-th-if="${session.acknowledgement}"
    data-th-object="${session.acknowledgement}"
    data-th-fragment="message" 
    data-th-classappend="(*{#strings.equals(type, 'SUCCESS') ? ' text-fg-success-strong bg-success-soft border-success-subtle' : ''}) +
                        (*{#strings.equals(type, 'ERROR') ? ' text-fg-danger-strong bg-danger-soft border-danger-subtle' : ''}) +
                        (*{#strings.equals(type, 'WARNING') ? ' text-fg-warning-strong bg-warning-soft border-warning-subtle' : ''}) +
                        (*{#strings.equals(type, 'INFO') ? ' text-fg-brand-strong bg-brand-soft border-subtle' : ''})"
    class="flex items-start sm:items-center p-4 mb-4 text-sm rounded-base border" role="alert">
    <svg class="w-4 h-4 me-2 shrink-0 mt-0.5 sm:mt-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
    <p>
        <span class="font-medium me-1" data-th-text="*{message}"></span>
    </p>
        <data-th-block data-th-text="${@sessionUtil.removeAcknowledgement()}"></data-th-block>
</div>
