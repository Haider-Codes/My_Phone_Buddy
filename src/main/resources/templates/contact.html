<!DOCTYPE html>
<html lang="en" data-th-replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>

    <!-- Using Thymeleaf Fragment -->
    <div id="content">

        <section class="relative overflow-hidden bg-blue-200 dark:bg-blue-950">
            <!-- BACKGROUND BLOBS -->
            <div class="absolute inset-0 z-10 pointer-events-none">
                <div class="absolute w-96 h-96 bg-blue-400/30 dark:bg-blue-500/20 rounded-full blur-3xl animate-blob top-10 left-10"></div>
                <div class="absolute w-96 h-96 bg-purple-400/30 dark:bg-purple-500/20 rounded-full blur-3xl animate-blob animation-delay-2000 top-1/3 right-10"></div>
                <div class="absolute w-96 h-96 bg-indigo-400/30 dark:bg-indigo-500/20 rounded-full blur-3xl animate-blob animation-delay-4000 bottom-10 left-1/3"></div>
            </div>

            <!-- HERO -->
            <div class="py-20 text-center">
                <h1 class="text-4xl md:text-5xl font-bold mb-4">Get in Touch</h1>
                <p class="text-gray-500 dark:text-gray-400 max-w-2xl mx-auto text-lg">
                    Have questions or feedback? We'd love to hear from you.
                </p>
            </div>
        </section>

        <!-- CONTACT SECTION -->
        <section class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid md:grid-cols-2 gap-12 items-start">

            <!-- LEFT INFO -->
            <div class="space-y-6">
            <div class="p-6 rounded-2xl bg-white/70 dark:bg-gray-800/70 backdrop-blur shadow">
                <h3 class="text-lg font-semibold mb-2">📧 Email</h3>
                <p class="text-gray-500">support@myphonebuddy.com</p>
            </div>

            <div class="p-6 rounded-2xl bg-white/70 dark:bg-gray-800/70 backdrop-blur shadow">
                <h3 class="text-lg font-semibold mb-2">📞 Phone</h3>
                <p class="text-gray-500">+91 9876543210</p>
            </div>

            <div class="p-6 rounded-2xl bg-white/70 dark:bg-gray-800/70 backdrop-blur shadow">
                <h3 class="text-lg font-semibold mb-2">📍 Location</h3>
                <p class="text-gray-500">Lucknow, India</p>
            </div>
            </div>

            <!-- FORM -->
            <form data-th-action="@{'/feedback'}" method="post" data-th-object="${feedbackInfo}" class="p-8 rounded-2xl bg-white/70 dark:bg-gray-800/70 backdrop-blur shadow-lg space-y-6" novalidate>
                <!-- Acknowledgement -->
                <div data-th-replace="~{message :: message}"></div> 
                <div class="mb-4">
                <label for="name" class="block mb-2.5 text-sm font-medium text-heading">Your Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                            <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M2.038 5.61A2.01 2.01 0 0 0 2 6v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6c0-.12-.01-.238-.03-.352l-.866.65-7.89 6.032a2 2 0 0 1-2.429 0L2.884 6.288l-.846-.677Z"/>
                                <path d="M20.677 4.117A1.996 1.996 0 0 0 20 4H4c-.225 0-.44.037-.642.105l.758.607L12 10.742 19.9 4.7l.777-.583Z"/>
                            </svg>
                        </div>
                        <input type="text" id="input-group-1" data-th-field="*{name}" name="name" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Enter your name">
                    </div>
                    <!-- Validating input fields -->
                    <p data-th-if="${#fields.hasErrors('name')}" data-th-text="${#fields.errors('name')[0]}" class="text-sm text-red-500 px-2 py-2"></p>                    
                </div>
                <div class="mb-4">
                <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Your Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                            <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M2.038 5.61A2.01 2.01 0 0 0 2 6v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6c0-.12-.01-.238-.03-.352l-.866.65-7.89 6.032a2 2 0 0 1-2.429 0L2.884 6.288l-.846-.677Z"/>
                                <path d="M20.677 4.117A1.996 1.996 0 0 0 20 4H4c-.225 0-.44.037-.642.105l.758.607L12 10.742 19.9 4.7l.777-.583Z"/>
                            </svg>
                        </div>
                        <input type="text" id="input-group-1" data-th-field="*{email}" name="email" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Enter your email">
                    </div>
                    <!-- Validating input fields -->
                    <p data-th-if="${#fields.hasErrors('email')}" data-th-text="${#fields.errors('email')[0]}" class="text-sm text-red-500 px-2 py-2"></p>
                </div>
                <div class="mb-4">                            
                    <label for="message" class="flex items-center gap-2 mb-2.5 text-sm font-medium text-heading">
                    <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" d="M3 5.983C3 4.888 3.895 4 5 4h14c1.105 0 2 .888 2 1.983v8.923a1.992 1.992 0 0 1-2 1.983h-6.6l-2.867 2.7c-.955.899-2.533.228-2.533-1.08v-1.62H5c-1.105 0-2-.888-2-1.983V5.983Zm5.706 3.809a1 1 0 1 0-1.412 1.417 1 1 0 1 0 1.412-1.417Zm2.585.002a1 1 0 1 1 .003 1.414 1 1 0 0 1-.003-1.414Zm5.415-.002a1 1 0 1 0-1.412 1.417 1 1 0 1 0 1.412-1.417Z" clip-rule="evenodd"/>
                    </svg>
                    Your Message
                    </label>
                    <textarea id="message" rows="6" data-th-field="*{message}" name="message" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-3.5 shadow-xs placeholder:text-body" placeholder="Write your message here..."></textarea>
                </div>
                    <!-- Validating input fields -->
                    <p data-th-if="${#fields.hasErrors('message')}" data-th-text="${#fields.errors('message')[0]}" class="text-sm text-red-500 px-2 py-2"></p>
                <div class="flex gap-2">
                    <button type="submit" class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none w-1/2 mb-3">Login</button>
                    <button type="reset" class="text-white text-center bg-danger box-border border border-transparent hover:bg-danger-strong focus:ring-4 focus:ring-danger-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none w-1/2 mb-3">Reset</button>
                </div>
                <!-- <p id="successMsg" class="hidden text-green-500 text-sm">✅ Message sent successfully!</p> -->
            </form>
        </section>

    </div>

    <script>console.log("Welcome to the contact page.")</script>
</body>
</html>
