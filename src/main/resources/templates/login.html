<!DOCTYPE html>
<html lang="en" data-th-replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

    <!-- Using Thymeleaf Fragment -->
    <div id="content">
        <!-- Using Grid Style -->
        <div class="grid grid-cols-12">
            <div class="md:col-span-2 lg:col-span-3 xl:col-span-4"></div>
            <div class="col-span-12 md:col-span-8 lg:col-span-6 xl:col-span-4">
                <div class="w-full mt-5 bg-neutral-primary-soft p-6 border border-t-green-500 border-t-6 dark:border-t-yellow-500 hover:bg-gray-200 dark:hover:bg-gray-700 border-default rounded-base shadow-xs">                   
                    <form data-th-action="@{'/authenticate'}" method="post" novalidate>
                        <h5 class="text-xl text-center font-semibold text-heading mb-2">Login Here</h5>
                        <h6 class="text-sm text-center font-serif text-gray-400 dark:text-gray-500 mb-3">Manage your contacts on your fingertips...</h6>
                            <!-- These error are parameter which are only present if /login?error=true is redirection url from security cofig -->
                            <div data-th-if="${param.error}">
			                    <div class="p-4 mb-4 text-sm text-center text-fg-danger-strong rounded-base bg-danger-medium" role="alert">
                                    <span class="font-medium">Incorrect username or password.</span>
                                </div>
                            </div>
		                    <div data-th-if="${param.logout}">
			                    <div class="p-4 mb-4 text-center text-sm text-fg-success-strong rounded-base bg-success-medium" role="alert">
                                    <span class="font-medium">You are successfully logged out.</span>
                                </div>
                            </div>
                            
                            <!-- Acknowledgement message incase of disabled user. This will show when disabled exception 
                             because by default, form login user is disabled by default with redirection-url: /login coming from
                             redirect from AuthFailureHandler -->

                            <div data-th-replace="~{message :: message}"></div> 
                            <div class="mb-4">
                            <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Email</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                                        <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M2.038 5.61A2.01 2.01 0 0 0 2 6v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6c0-.12-.01-.238-.03-.352l-.866.65-7.89 6.032a2 2 0 0 1-2.429 0L2.884 6.288l-.846-.677Z"/>
                                            <path d="M20.677 4.117A1.996 1.996 0 0 0 20 4H4c-.225 0-.44.037-.642.105l.758.607L12 10.742 19.9 4.7l.777-.583Z"/>
                                        </svg>
                                    </div>
                                    <input type="text" id="input-group-1" name="email" class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Enter your email">
                                </div>
                            </div>
                            <div class="mb-4">
                            <label for="password" class="block mb-2.5 text-sm font-medium text-heading">Your password</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
                                        <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                            <path fill-rule="evenodd" d="M8 10V7a4 4 0 1 1 8 0v3h1a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h1Zm2-3a2 2 0 1 1 4 0v3h-4V7Zm2 6a1 1 0 0 1 1 1v3a1 1 0 1 1-2 0v-3a1 1 0 0 1 1-1Z" clip-rule="evenodd"/>
                                        </svg>
                                    </div>
                                    <input type="password" id="password" name="password" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full pe-3 ps-9 py-2.5 shadow-xs placeholder:text-body" placeholder="•••••••••" required />
                                    <div class="absolute inset-y-0 inset-e-0 flex items-center ps-4 pe-4">
                                        <a type="button" href="#" id="mode-on">
                                            <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                                <path fill-rule="evenodd" d="M4.998 7.78C6.729 6.345 9.198 5 12 5c2.802 0 5.27 1.345 7.002 2.78a12.713 12.713 0 0 1 2.096 2.183c.253.344.465.682.618.997.14.286.284.658.284 1.04s-.145.754-.284 1.04a6.6 6.6 0 0 1-.618.997 12.712 12.712 0 0 1-2.096 2.183C17.271 17.655 14.802 19 12 19c-2.802 0-5.27-1.345-7.002-2.78a12.712 12.712 0 0 1-2.096-2.183 6.6 6.6 0 0 1-.618-.997C2.144 12.754 2 12.382 2 12s.145-.754.284-1.04c.153-.315.365-.653.618-.997A12.714 12.714 0 0 1 4.998 7.78ZM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/>
                                            </svg>
                                        </a>                                
                                        <a href="#" id="mode-off">
                                            <svg class="w-5 h-5 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                                <path d="m4 15.6 3.055-3.056A4.913 4.913 0 0 1 7 12.012a5.006 5.006 0 0 1 5-5c.178.009.356.027.532.054l1.744-1.744A8.973 8.973 0 0 0 12 5.012c-5.388 0-10 5.336-10 7A6.49 6.49 0 0 0 4 15.6Z"/>
                                                <path d="m14.7 10.726 4.995-5.007A.998.998 0 0 0 18.99 4a1 1 0 0 0-.71.305l-4.995 5.007a2.98 2.98 0 0 0-.588-.21l-.035-.01a2.981 2.981 0 0 0-3.584 3.583c0 .012.008.022.01.033.05.204.12.402.211.59l-4.995 4.983a1 1 0 1 0 1.414 1.414l4.995-4.983c.189.091.386.162.59.211.011 0 .021.007.033.01a2.982 2.982 0 0 0 3.584-3.584c0-.012-.008-.023-.011-.035a3.05 3.05 0 0 0-.21-.588Z"/>
                                                <path d="m19.821 8.605-2.857 2.857a4.952 4.952 0 0 1-5.514 5.514l-1.785 1.785c.767.166 1.55.25 2.335.251 6.453 0 10-5.258 10-7 0-1.166-1.637-2.874-2.179-3.407Z"/>
                                            </svg>
                                        </a>
                                    </div>                                
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button type="submit" class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none w-1/2 mb-3">Login</button>
                                <button type="reset" class="text-white text-center bg-danger box-border border border-transparent hover:bg-danger-strong focus:ring-4 focus:ring-danger-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none w-1/2 mb-3">Reset</button>
                            </div>
                    </form>
                    <div class="flex flex-col justify-center items-center p-4">
                        <a data-th-href="@{'/oauth2/authorization/google'}" type="button" class="px-3 py-2 mb-3 w-fit border flex gap-2 border-slate-100 dark:border-slate-700 rounded-md shadow-md text-slate-700 dark:text-slate-200 hover:border-slate-400 dark:hover:border-slate-500 hover:text-slate-900 dark:hover:text-slate-300 text-base font-semibold hover:shadow transition duration-150">
                         <img data-th-src="@{'/assets/traced-google_logo.png'}" class="h-6" alt="Google logo"/>
                            Login with Google
                        </a>
                        <a data-th-href="@{'/oauth2/authorization/github'}" type="button" class="py-2 px-3 w-fit border flex gap-2 justify-center items-center bg-gray-700 hover:bg-gray-800 focus:ring-gray-500 focus:ring-offset-gray-200 text-white transition ease-in duration-200 text-center text-base font-semibold shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 rounded-md">
                         <img data-th-src="@{'/assets/github_logo.png'}" class="h-6" alt="GitHub logo"/>
                            Login with GitHub
                        </a>
                    </div>
                </div>
            </div>
            <!-- <div class="grid-col-span-3"></div> -->
        </div>
    </div>
    <script>console.log("Welcome to the login page.")</script>
    <script data-th-src="@{'/js/password.js'}"></script>
</body>
</html>
